plugins {
    id "com.android.application"
    // START: FlutterFire Configuration
    id 'com.google.gms.google-services'
    // END: FlutterFire Configuration
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

// firebase-iid is bundled inside firebase-messaging 23+; exclude the old standalone artifact
configurations.all {
    exclude group: 'com.google.firebase', module: 'firebase-iid'
}

android {
    namespace "com.pronutri.app"
    compileSdk 35
    ndkVersion "27.0.12077973"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }

    defaultConfig {
        applicationId "com.pronutri.app"
        minSdk 26
        targetSdk 35
        versionCode 9
        versionName "2.1.0"
        ndk {
            abiFilters "arm64-v8a"
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    // Strip Agora extension .so files that this app never enables.
    // Each one is only loaded if you explicitly call its API — since we don't,
    // removing them is safe and saves ~30 MB.
    packagingOptions {
        def unusedAgora = [
            'libagora_lip_sync_extension.so',          // 7 MB  – lip-sync AI
            'libagora_spatial_audio_extension.so',     // 4.6 MB – 3D spatial audio
            'libagora_clear_vision_extension.so',      // 4.4 MB – AI video enhancement
            'libagora_face_capture_extension.so',      // 2.8 MB – face capture
            'libagora_segmentation_extension.so',      // 2.8 MB – background removal
            'libagora_audio_beauty_extension.so',      // 2.1 MB – voice beautifier
            'libagora_content_inspect_extension.so',   // 1.7 MB – content moderation
            'libagora_video_av1_encoder_extension.so', // 1.5 MB – AV1 encoder
            'libagora_face_detection_extension.so',    // 1.3 MB – face detection
            'libagora_video_av1_decoder_extension.so', // 1.2 MB – AV1 decoder
            'libagora_video_quality_analyzer_extension.so', // 1.1 MB
            'libagora_ai_echo_cancellation_extension.so',   // 0.8 MB
            'libagora_ai_echo_cancellation_ll_extension.so',// 0.8 MB
        ]
        unusedAgora.each { lib ->
            ['arm64-v8a', 'armeabi-v7a', 'x86_64'].each { abi ->
                exclude "lib/${abi}/${lib}"
            }
        }
    }
}

flutter {
    source "../.."
}
